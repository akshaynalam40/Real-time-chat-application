<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Real-Time Chat Application</title>

    <!-- Bootstrap -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <!-- Google Font -->
    <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
            rel="stylesheet">

    <!-- SockJS -->
    <script
            src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js">
    </script>

    <!-- STOMP -->
    <script
            src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.2.0/bundles/stomp.umd.min.js">
    </script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            background: linear-gradient(135deg,#667eea,#764ba2);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .chat-container{
            width:100%;
            max-width:700px;
            height:85vh;

            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);

            border-radius:20px;
            padding:20px;

            box-shadow:0 8px 32px rgba(0,0,0,0.2);

            display:flex;
            flex-direction:column;
        }

        .chat-header{
            text-align:center;
            color:white;
            margin-bottom:20px;
        }

        .chat-header h1{
            font-size:32px;
            font-weight:600;
        }

        #chat{
            flex:1;
            overflow-y:auto;

            background:white;
            border-radius:15px;

            padding:15px;
            margin-bottom:15px;

            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .message{
            margin-bottom:15px;
            display:flex;
            flex-direction:column;
        }

        .sender{
            font-size:13px;
            font-weight:600;
            color:#555;
            margin-bottom:5px;
        }

        .text{
            background:#667eea;
            color:white;
            padding:12px 16px;
            border-radius:15px;
            width:fit-content;
            max-width:75%;
            word-wrap:break-word;
        }

        .top-input{
            margin-bottom:15px;
        }

        .input-area{
            display:flex;
            gap:10px;
        }

        .form-control{
            border:none;
            border-radius:12px;
            padding:12px;
        }

        .form-control:focus{
            box-shadow:none;
        }

        #sendMessage{
            border:none;
            border-radius:12px;
            padding:12px 20px;

            background:#667eea;
            color:white;

            font-weight:500;
            transition:0.3s;
        }

        #sendMessage:hover{
            background:#5a67d8;
            transform:scale(1.05);
        }

        #chat::-webkit-scrollbar{
            width:6px;
        }

        #chat::-webkit-scrollbar-thumb{
            background:#888;
            border-radius:10px;
        }

        .form-label{
            color:white;
            margin-bottom:6px;
        }

    </style>

</head>

<body>

<div class="chat-container">

    <!-- Header -->
    <div class="chat-header">
        <h1>💬 Real-Time Chat</h1>
        <p>Connect instantly with friends</p>
    </div>

    <!-- Chat Box -->
    <div id="chat">

        <!-- Dummy Hidden Elements to remove IntelliJ warnings -->
        <div class="message d-none">
            <div class="sender"></div>
            <div class="text"></div>
        </div>

    </div>

    <!-- Name Input -->
    <div class="top-input">

        <label for="senderInput"
               class="form-label">
            Your Name
        </label>

        <input id="senderInput"
               type="text"
               class="form-control"
               placeholder="Enter your name">

    </div>

    <!-- Message Input -->
    <div>

        <label for="messageInput"
               class="form-label">
            Message
        </label>

        <div class="input-area">

            <input id="messageInput"
                   type="text"
                   class="form-control"
                   placeholder="Type your message...">

            <button id="sendMessage">
                Send
            </button>

        </div>

    </div>

</div>

<script>

    let stompClient = null;

    function setConnected(connected) {

        document.getElementById('sendMessage')
            .disabled = !connected;
    }

    function connect() {

        const socket = new SockJS('/chat');

        stompClient = StompJs.Stomp.over(socket);

        stompClient.connect({}, function(frame) {

            console.log('Connected: ' + frame);

            setConnected(true);

            stompClient.subscribe(
                '/topic/messages',
                function(message) {

                    showMessage(
                        JSON.parse(message.body)
                    );

                }
            );

        });
    }

    function showMessage(message) {

        const chat =
            document.getElementById('chat');

        const messageElement =
            document.createElement('div');

        messageElement.className = "message";

        messageElement.innerHTML = `
            <div class="sender">
                ${message.sender}
            </div>

            <div class="text">
                ${message.content}
            </div>
        `;

        chat.appendChild(messageElement);

        chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {

        const sender =
            document.getElementById('senderInput')
                .value
                .trim();

        const content =
            document.getElementById('messageInput')
                .value
                .trim();

        if(sender === '' || content === '') {

            alert(
                "Please enter your name and message"
            );

            return;
        }

        const chatMessage = {
            sender: sender,
            content: content
        };

        stompClient.send(
            "/app/sendMessage",
            {},
            JSON.stringify(chatMessage)
        );

        document.getElementById('messageInput')
            .value = '';
    }

    // Send button click
    document.getElementById('sendMessage')
        .onclick = sendMessage;

    // Enter key support
    document.getElementById('messageInput')
        .addEventListener(
            "keypress",
            function(event){

                if(event.key === "Enter") {
                    sendMessage();
                }

            }
        );

    // Connect when page loads
    window.onload = connect;

</script>

</body>
</html>
